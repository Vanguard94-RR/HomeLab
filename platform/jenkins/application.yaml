apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: jenkins
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    targetRevision: 5.8.110

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ci-cd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
