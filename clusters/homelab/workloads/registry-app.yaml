apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: registry
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Vanguard94-RR/HomeLab.git
    targetRevision: main
    path: workloads/registry/k8s
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: docker-registry

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
