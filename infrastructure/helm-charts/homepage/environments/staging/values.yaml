# Homepage Staging Environment
environment: staging
namespace: homepage-staging

replicaCount: 2

image:
  repository: 192.168.1.91:32500/homepage
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 3000
  nodePort: 32302

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: true
  storageClass: longhorn
  size: 1Gi
  accessMode: ReadWriteOnce

env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    value: "192.168.1.91:32302"
  - name: PUID
    value: "1000"
  - name: PGID
    value: "1000"

config:
  services:
    - SysAdmin:
        - Cockpit:
            href: http://192.168.1.65:9090/
            description: Staging
        - Jenkins:
            href: http://192.168.1.91:32000/
            description: Jenkins Staging
  
  settings:
    title: Homepage Staging
    tagline: Staging Environment
    theme: dark
    color: blue
    language: en
    timezone: America/Mexico_City
    background:
      opacity: 50

  widgets:
    - resources:
        index: 0
        cpu: true
        memory: true
        disk: /
    - datetime:
        index: 1
        format:
          timeStyle: short
          dateStyle: medium
        timezone: America/Mexico_City
