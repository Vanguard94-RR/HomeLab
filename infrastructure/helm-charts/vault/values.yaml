vault:
  server:

    dev:
      enabled: false

    standalone:
      enabled: true

      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "file" {
          path = "/vault/data"
        }

        disable_mlock = true

    dataStorage:
      enabled: true
      size: 5Gi
      storageClass: longhorn

    service:
      enabled: true
      type: ClusterIP

    ingress:
      enabled: false

  injector:
    enabled: false
