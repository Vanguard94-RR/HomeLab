apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Vanguard94-RR/HomeLab.git
    targetRevision: main
    path: clusters/homelab

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
