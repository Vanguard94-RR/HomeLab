apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    targetRevision: 5.8.110
    helm:
      values: |
        controller:
          serviceAccount:
            create: true
            name: jenkins

  destination:
    server: https://kubernetes.default.svc
    namespace: ci-cd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
