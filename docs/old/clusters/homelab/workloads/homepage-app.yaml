apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Vanguard94-RR/HomeLab.git
    targetRevision: main
    path: helm/custom/homepage
    helm:
      valueFiles:
        - environments/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: homepage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
