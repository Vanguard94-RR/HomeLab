apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calibreweb
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Vanguard94-RR/HomeLab.git
    targetRevision: main
    path: helm/custom/calibreweb

  destination:
    server: https://kubernetes.default.svc
    namespace: calibreweb

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
